<div class="card shadow-lg border-0 rounded-4 p-4">

  <h2 class="text-center mb-4">Gestor de Tareas</h2>

  <div *ngIf="mensajeVisible" class="alert alert-success text-center">
    Cambios guardados correctamente ✅
  </div>

  <form (ngSubmit)="agregarTarea()" class="mb-3">

    <div class="input-group">
      <input
        type="text"
        class="form-control"
        placeholder="Escribe una nueva tarea..."
        [(ngModel)]="nuevaTarea"
        name="tarea">

      <button class="btn btn-primary" type="submit">
        Agregar
      </button>
    </div>

  </form>

  <ul class="list-group mb-3">

    <li
      *ngFor="let tarea of tareas"
      class="list-group-item d-flex align-items-center">

      <input
        type="checkbox"
        class="form-check-input me-2"
        [(ngModel)]="tarea.completada"
        [ngModelOptions]="{standalone: true}">

      <span
        [class.text-decoration-line-through]="tarea.completada"
        [class.text-muted]="tarea.completada">

        {{ tarea.nombre }}

      </span>

    </li>

  </ul>

  <button
    class="btn btn-success w-100"
    (click)="guardarCambios()">

    Guardar cambios

  </button>

</div>
