<form (ngSubmit)="login()">

  <input
    type="text"
    placeholder="Usuario"
    [(ngModel)]="username"
    name="username"
    class="form-control mb-3"
  />

  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password"
    name="password"
    class="form-control mb-3"
  />

  <button type="submit" class="btn btn-primary w-100">
    Ingresar
  </button>

</form>
